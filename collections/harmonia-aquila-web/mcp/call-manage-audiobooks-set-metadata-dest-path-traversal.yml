info:
  name: call-manage-audiobooks-set-metadata-dest-path-traversal
  type: http
  seq: 37

http:
  method: POST
  url: "{{baseUrl}}/mcp"
  body:
    type: json
    data: |-
      {
        "jsonrpc": "2.0",
        "id": 111,
        "method": "tools/call",
        "params": {
          "name": "manage_audiobooks_set_metadata",
          "arguments": {
            "author": "Author",
            "destFilepath": "../outside.m4b",
            "sourceFilepath": "{{sampleAlbumFileName}}",
            "title": "Title"
          }
        }
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        req.setHeader("Accept", "application/json, text/event-stream");
        req.setHeader("MCP-Protocol-Version", bru.getEnvVar("mcpProtocolVersion"));
    - type: tests
      code: |-
        test("200 status code", function () {
          expect(res.getStatus()).to.eql(200);
        });

        test("tool response reports destination root violation", function () {
          const body = res.getBody();
          const json = typeof body === "string" ? JSON.parse(body) : body;

          expect(json).to.have.property("id", 111);
          expect(json.result).to.have.property("isError", true);
          expect(json.result.content[0].text).to.include("--dest-dir");
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
