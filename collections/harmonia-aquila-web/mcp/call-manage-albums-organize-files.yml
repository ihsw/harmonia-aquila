info:
  name: call-manage-albums-organize-files
  type: http
  seq: 31

http:
  method: POST
  url: "{{baseUrl}}/mcp"
  body:
    type: json
    data: |-
      {
        "jsonrpc": "2.0",
        "id": 105,
        "method": "tools/call",
        "params": {
          "name": "manage_albums_organize_files",
          "arguments": {
            "ignoreNonAudioFiles": true,
            "limit": 0
          }
        }
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        req.setHeader("Accept", "application/json, text/event-stream");
        req.setHeader("MCP-Protocol-Version", bru.getEnvVar("mcpProtocolVersion"));
    - type: tests
      code: |-
        test("200 status code", function () {
          expect(res.getStatus()).to.eql(200);
        });

        test("tool response content is a JSON array", function () {
          const body = res.getBody();
          const json = typeof body === "string" ? JSON.parse(body) : body;
          const rows = JSON.parse(json.result.content[0].text);

          expect(json).to.have.property("id", 105);
          expect(rows).to.be.an("array");
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
