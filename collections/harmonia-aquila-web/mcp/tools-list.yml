info:
  name: tools-list
  type: http
  seq: 27

http:
  method: POST
  url: "{{baseUrl}}/mcp"
  body:
    type: json
    data: |-
      {
        "jsonrpc": "2.0",
        "id": 101,
        "method": "tools/list",
        "params": {}
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        req.setHeader("Accept", "application/json, text/event-stream");
        req.setHeader("MCP-Protocol-Version", bru.getEnvVar("mcpProtocolVersion"));
    - type: tests
      code: |-
        test("200 status code", function () {
          expect(res.getStatus()).to.eql(200);
        });

        test("all manage albums and audiobooks tools are exposed", function () {
          const body = res.getBody();
          const json = typeof body === "string" ? JSON.parse(body) : body;
          const tools = json.result.tools;
          const toolNames = tools.map((tool) => tool.name);

          expect(json).to.have.property("id", 101);
          expect(toolNames).to.eql([
            "manage_albums_summarize_source_dir",
            "manage_albums_validate",
            "manage_albums_fix_tags",
            "manage_albums_organize_files",
            "manage_audiobooks_validate",
            "manage_audiobooks_crawl",
            "manage_audiobooks_copy_and_rename",
            "manage_audiobooks_convert_file",
            "manage_audiobooks_merge",
            "manage_audiobooks_set_metadata"
          ]);
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
