info:
  name: audiobook-crawl
  type: http
  seq: 4

http:
  method: POST
  url: "{{baseUrl}}/graphql"
  body:
    type: json
    data: |-
      {
        "query": "query AudiobookCrawl($input: AudiobookCrawlInput!) { audiobookCrawl(input: $input) { filename category reasonCode } }",
        "variables": {
          "input": {
            "dirName": "{{graphqlAudiobookDirName}}"
          }
        }
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("returns an audiobook crawl array", function () {
          const body = res.getBody();
          const json = typeof body === "string" ? JSON.parse(body) : body;

          expect(res.getStatus()).to.eql(200);
          expect(json).to.not.have.property("errors");
          expect(json).to.have.nested.property("data.audiobookCrawl").that.is.an("array");
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
