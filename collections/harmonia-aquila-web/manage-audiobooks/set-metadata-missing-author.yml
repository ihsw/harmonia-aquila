info:
  name: set-metadata-missing-author
  type: http
  seq: 23

http:
  method: POST
  url: "{{baseUrl}}/manage-audiobooks/set-metadata"
  body:
    type: json
    data: |-
      {
        "destFilepath": "book.m4b",
        "sourceFilepath": "{{sampleAlbumFileName}}",
        "title": "Title"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("400 status code", function () {
          expect(res.getStatus()).to.eql(400);
        });

        test("response body reports missing author", function () {
          const body = res.getBody();
          const json = typeof body === "string" ? JSON.parse(body) : body;

          expect(json).to.have.property("statusCode", 400);
          expect(json).to.have.property("message").that.includes("author is required");
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "400"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
