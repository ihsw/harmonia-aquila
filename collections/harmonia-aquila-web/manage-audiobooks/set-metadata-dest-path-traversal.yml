info:
  name: set-metadata-dest-path-traversal
  type: http
  seq: 25

http:
  method: POST
  url: "{{baseUrl}}/manage-audiobooks/set-metadata"
  body:
    type: json
    data: |-
      {
        "author": "Author",
        "destFilepath": "../outside.m4b",
        "sourceFilepath": "{{sampleAlbumFileName}}",
        "title": "Title"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("400 status code", function () {
          expect(res.getStatus()).to.eql(400);
        });

        test("response body reports destination root violation", function () {
          const body = res.getBody();
          const json = typeof body === "string" ? JSON.parse(body) : body;

          expect(json).to.have.property("statusCode", 400);
          expect(json).to.have.property("message").that.includes("--dest-dir");
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "400"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
