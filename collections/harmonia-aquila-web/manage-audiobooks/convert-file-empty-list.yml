info:
  name: convert-file-empty-list
  type: http
  seq: 18

http:
  method: POST
  url: "{{baseUrl}}/manage-audiobooks/convert-file"
  body:
    type: json
    data: |-
      {
        "fileName": []
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("400 status code", function () {
          expect(res.getStatus()).to.eql(400);
        });

        test("response body reports missing file list", function () {
          const body = res.getBody();
          const json = typeof body === "string" ? JSON.parse(body) : body;

          expect(json).to.have.property("statusCode", 400);
          expect(json).to.have.property("message").that.includes("at least one --file-name");
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "400"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
