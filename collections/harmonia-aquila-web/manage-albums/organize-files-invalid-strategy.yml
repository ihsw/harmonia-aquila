info:
  name: organize-files-invalid-strategy
  type: http
  seq: 8

http:
  method: POST
  url: "{{baseUrl}}/manage-albums/organize-files"
  body:
    type: json
    data: |-
      {
        "artistFilenameStrategy": "invalid"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("400 status code", function () {
          expect(res.getStatus()).to.eql(400);
        });

        test("response body reports strategy contract error", function () {
          const body = res.getBody();
          const json = typeof body === "string" ? JSON.parse(body) : body;

          expect(json).to.have.property("statusCode", 400);
          expect(json).to.have.property("message").that.includes("--artist-filename-strategy");
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "400"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
