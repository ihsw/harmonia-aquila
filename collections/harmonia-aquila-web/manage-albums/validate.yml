info:
  name: validate
  type: http
  seq: 10

http:
  method: GET
  url: "{{baseUrl}}/manage-albums/validate?dirName={{summarizeDirName}}&ignoreNonAudioFiles={{ignoreNonAudioFiles}}&limit=0"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("200 status code", function () {
          expect(res.getStatus()).to.eql(200);
        });

        test("response body is an array", function () {
          const body = res.getBody();
          const json = typeof body === "string" ? JSON.parse(body) : body;

          expect(json).to.be.an("array");
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
