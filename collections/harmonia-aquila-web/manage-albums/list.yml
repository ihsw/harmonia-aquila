info:
  name: list
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/manage-albums/list?prefix={{albumListPrefix}}"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("returns a list array", function () {
          const body = res.getBody();
          const json = typeof body === "string" ? JSON.parse(body) : body;

          expect(res.getStatus()).to.eql(200);
          expect(json).to.be.an("array");
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
